name: CI/CD

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, dev]

env:
  PROJECT_ID: personal-enterprise-493003
  REGION: us-central1
  IMAGE: us-central1-docker.pkg.dev/personal-enterprise-493003/personal-enterprise/gql-project-mgr
  WIF_PROVIDER: projects/213672305641/locations/global/workloadIdentityPools/github-actions/providers/github-actions-provider
  SERVICE_ACCOUNT: personal-enterprise-run@personal-enterprise-493003.iam.gserviceaccount.com

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm test --passWithNoTests

      - name: Integration test
        run: pnpm run test:integration

  deploy-dev:
    needs: build-and-test
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} .
          docker push ${{ env.IMAGE }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy gql-project-mgr-dev \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --platform managed \
            --max-instances 2 \
            --service-account ${{ env.SERVICE_ACCOUNT }} \
            --set-secrets MONGO_URI=db-url-project-mgr:latest,JWT_PUBLIC_KEY=jwt-public-key:latest \
            --set-env-vars DB_NAME=${{ vars.DB_NAME }} \
            --allow-unauthenticated

  deploy-prod:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} .
          docker push ${{ env.IMAGE }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy gql-project-mgr \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --platform managed \
            --max-instances 2 \
            --service-account ${{ env.SERVICE_ACCOUNT }} \
            --set-secrets MONGO_URI=db-url-project-mgr:latest,JWT_PUBLIC_KEY=jwt-public-key:latest \
            --set-env-vars DB_NAME=${{ vars.DB_NAME }} \
            --allow-unauthenticated
